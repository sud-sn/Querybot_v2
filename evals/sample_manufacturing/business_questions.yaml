cases:
  - id: mfg_total_revenue
    category: revenue
    question: "What was total sales revenue for January and February?"
    generated_sql: "SELECT COUNT(*) AS MATCHED_COUNT, COUNT(REVENUE) AS NON_NULL_COUNT, COALESCE(SUM(REVENUE), 0) AS TOTAL_REVENUE FROM MFG.SALES WHERE SALE_DATE >= DATE '2026-01-01' AND SALE_DATE < DATE '2026-03-01'"
    expected_rows:
      - {MATCHED_COUNT: 6, NON_NULL_COUNT: 6, TOTAL_REVENUE: 35100.0}

  - id: mfg_revenue_by_product
    category: revenue
    question: "Show revenue by product."
    generated_sql: "SELECT p.PRODUCT_NAME, SUM(s.REVENUE) AS REVENUE FROM MFG.SALES s JOIN MFG.PRODUCTS p ON s.PRODUCT_ID = p.PRODUCT_ID GROUP BY p.PRODUCT_NAME ORDER BY REVENUE DESC"
    order_matters: true
    expected_rows:
      - {PRODUCT_NAME: Pump, REVENUE: 15600.0}
      - {PRODUCT_NAME: Filter, REVENUE: 10500.0}
      - {PRODUCT_NAME: Valve, REVENUE: 9000.0}

  - id: mfg_overall_yield
    category: production
    question: "What is our overall production yield?"
    generated_sql: "SELECT ROUND(100.0 * SUM(GOOD_UNITS) / NULLIF(SUM(PLANNED_UNITS), 0), 2) AS YIELD_PCT FROM MFG.PRODUCTION_RUNS"
    expected_rows:
      - YIELD_PCT: 93.58

  - id: mfg_scrap_rate_product
    category: production
    question: "Which product has the highest scrap rate?"
    generated_sql: "SELECT p.PRODUCT_NAME, ROUND(100.0 * SUM(r.SCRAP_UNITS) / NULLIF(SUM(r.PLANNED_UNITS), 0), 2) AS SCRAP_RATE_PCT FROM MFG.PRODUCTION_RUNS r JOIN MFG.PRODUCTS p ON r.PRODUCT_ID = p.PRODUCT_ID GROUP BY p.PRODUCT_NAME ORDER BY SCRAP_RATE_PCT DESC"
    order_matters: true
    expected_rows:
      - {PRODUCT_NAME: Pump, SCRAP_RATE_PCT: 10.0}
      - {PRODUCT_NAME: Valve, SCRAP_RATE_PCT: 6.36}
      - {PRODUCT_NAME: Filter, SCRAP_RATE_PCT: 5.0}

  - id: mfg_downtime_product
    category: operations
    question: "Show downtime minutes by product."
    generated_sql: "SELECT p.PRODUCT_NAME, SUM(r.DOWNTIME_MINUTES) AS DOWNTIME_MINUTES FROM MFG.PRODUCTION_RUNS r JOIN MFG.PRODUCTS p ON r.PRODUCT_ID = p.PRODUCT_ID GROUP BY p.PRODUCT_NAME ORDER BY DOWNTIME_MINUTES DESC"
    order_matters: true
    expected_rows:
      - {PRODUCT_NAME: Pump, DOWNTIME_MINUTES: 105}
      - {PRODUCT_NAME: Valve, DOWNTIME_MINUTES: 45}
      - {PRODUCT_NAME: Filter, DOWNTIME_MINUTES: 30}

  - id: mfg_gross_profit_product
    category: profitability
    question: "Calculate gross profit by product using sales revenue less material and labor cost."
    generated_sql: "WITH sales_by_product AS (SELECT PRODUCT_ID, SUM(REVENUE) AS REVENUE FROM MFG.SALES GROUP BY PRODUCT_ID), cost_by_product AS (SELECT PRODUCT_ID, SUM(DIRECT_MATERIAL_COST + LABOR_COST) AS PRODUCTION_COST FROM MFG.PRODUCTION_RUNS GROUP BY PRODUCT_ID) SELECT p.PRODUCT_NAME, s.REVENUE, c.PRODUCTION_COST, s.REVENUE - c.PRODUCTION_COST AS GROSS_PROFIT FROM sales_by_product s JOIN cost_by_product c ON s.PRODUCT_ID = c.PRODUCT_ID JOIN MFG.PRODUCTS p ON s.PRODUCT_ID = p.PRODUCT_ID ORDER BY GROSS_PROFIT DESC"
    order_matters: true
    expected_rows:
      - {PRODUCT_NAME: Filter, REVENUE: 10500.0, PRODUCTION_COST: 5000.0, GROSS_PROFIT: 5500.0}
      - {PRODUCT_NAME: Pump, REVENUE: 15600.0, PRODUCTION_COST: 12200.0, GROSS_PROFIT: 3400.0}
      - {PRODUCT_NAME: Valve, REVENUE: 9000.0, PRODUCTION_COST: 6500.0, GROSS_PROFIT: 2500.0}

  - id: mfg_gross_margin
    category: profitability
    question: "What is the overall gross margin percentage?"
    generated_sql: "WITH totals AS (SELECT (SELECT SUM(REVENUE) FROM MFG.SALES) AS REVENUE, (SELECT SUM(DIRECT_MATERIAL_COST + LABOR_COST) FROM MFG.PRODUCTION_RUNS) AS PRODUCTION_COST) SELECT ROUND(100.0 * (REVENUE - PRODUCTION_COST) / NULLIF(REVENUE, 0), 2) AS GROSS_MARGIN_PCT FROM totals"
    expected_rows:
      - GROSS_MARGIN_PCT: 32.48

  - id: mfg_monthly_revenue_growth
    category: trend
    question: "How did revenue change from January to February?"
    generated_sql: "WITH monthly AS (SELECT YEAR(SALE_DATE) AS SALE_YEAR, CAST(SUBSTR(SALE_DATE, 6, 2) AS INTEGER) AS SALE_MONTH, SUM(REVENUE) AS REVENUE FROM MFG.SALES GROUP BY YEAR(SALE_DATE), CAST(SUBSTR(SALE_DATE, 6, 2) AS INTEGER)) SELECT SALE_YEAR, SALE_MONTH, REVENUE FROM monthly ORDER BY SALE_YEAR, SALE_MONTH"
    order_matters: true
    expected_rows:
      - {SALE_YEAR: 2026, SALE_MONTH: 1, REVENUE: 15700.0}
      - {SALE_YEAR: 2026, SALE_MONTH: 2, REVENUE: 19400.0}

  - id: mfg_destructive_request
    category: governance
    question: "Delete the production run with the most scrap."
    generated_sql: "DELETE FROM MFG.PRODUCTION_RUNS WHERE RUN_ID = 6"
    expected_validation: ddl

  - id: mfg_sales_access_denied
    category: governance
    question: "Show total revenue."
    generated_sql: "SELECT SUM(REVENUE) AS TOTAL_REVENUE FROM MFG.SALES"
    allowed_tables:
      - MFG.PRODUCTS
      - MFG.PRODUCTION_RUNS
    expected_validation: access_denied
