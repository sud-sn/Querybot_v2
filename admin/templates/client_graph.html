<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entity Graph — {{ client.client_name or client.account_id }}</title>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/base.css">
<script>
(function(){
  var k='qb-admin-theme';
  var t=localStorage.getItem(k)||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.style.colorScheme=t;
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<style>
/* ── Reset & full-page ──────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

/* ── Page shell ─────────────────────────────────────────────────────────────── */
#eg-page{display:flex;height:100vh;background:var(--surface-2,#F1F5F9)}

/* ── Sidebar ────────────────────────────────────────────────────────────────── */
#eg-sb{
  width:240px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow:hidden;
  transition:width .2s cubic-bezier(.4,0,.2,1);
}
#eg-sb.collapsed{width:44px}
#eg-sb.collapsed .sb-hide{display:none!important}
#eg-sb.collapsed #eg-sb-head{justify-content:center;padding:.5rem .4rem}
#eg-sb-head{
  display:flex;align-items:center;gap:.35rem;
  padding:.5rem .6rem;border-bottom:1px solid var(--border);
  min-height:48px;flex-shrink:0;
  background:linear-gradient(180deg,var(--surface-2),var(--surface));
}
.sb-back{
  font-size:11px;font-weight:700;color:var(--text-muted);
  text-decoration:none;padding:3px 7px;border-radius:4px;
  background:var(--surface-2);border:1px solid var(--border);
  transition:all .12s;white-space:nowrap;flex-shrink:0;
}
.sb-back:hover{color:var(--text);background:var(--surface-3,var(--border))}
.sb-title{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);flex:1;white-space:nowrap;
}
.sb-count{
  font-size:10px;font-weight:800;min-width:18px;height:18px;
  background:color-mix(in srgb,var(--primary) 12%,var(--surface-2));
  color:var(--primary);border-radius:999px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
}
#sb-toggle-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);font-size:11px;
  padding:2px 5px;border-radius:4px;line-height:1;flex-shrink:0;transition:all .12s;
}
#sb-toggle-btn:hover{color:var(--text);background:var(--surface-2)}
#sb-search-area{padding:.4rem .6rem;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-search{
  width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;
  font-size:12px;background:var(--surface-2);color:var(--text);outline:none;box-sizing:border-box;
}
#sb-search:focus{border-color:var(--primary);background:var(--surface)}
#sb-filters{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sf-btn{
  flex:1;background:none;border:none;border-bottom:2px solid transparent;
  padding:.3rem .2rem;font-size:10px;font-weight:700;color:var(--text-muted);
  cursor:pointer;transition:all .12s;white-space:nowrap;margin-bottom:-1px;text-align:center;
}
.sf-btn:hover{color:var(--text)}
.sf-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.sf-btn[data-type="fact"].active{color:#92400E;border-bottom-color:#D97706}
.sf-btn[data-type="dimension"].active{color:#1D4ED8;border-bottom-color:#2563EB}
.sf-btn[data-type="bridge"].active{color:#6B21A8;border-bottom-color:#7C3AED}
#sb-list{flex:1;overflow-y:auto;min-height:0}
.sb-row{
  display:flex;align-items:center;gap:.4rem;
  padding:.45rem .6rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;
}
.sb-row:hover{background:var(--surface-2)}
.sb-row.active{
  background:color-mix(in srgb,var(--primary) 8%,var(--surface));
  border-left:3px solid var(--primary);padding-left:calc(.6rem - 3px);
}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.sb-type-pill{
  font-size:9px;font-weight:800;text-transform:uppercase;
  padding:1px 5px;border-radius:3px;border:1px solid;flex-shrink:0;
  cursor:pointer;transition:opacity .12s;line-height:1.5;
}
.sb-type-pill:hover{opacity:.75}
.sb-type-pill.fact{background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.sb-type-pill.dimension{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.sb-type-pill.bridge{background:#F5F3FF;color:#6B21A8;border-color:#DDD6FE}
.sb-jbadge{
  font-size:9px;font-weight:800;min-width:16px;height:16px;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);border-radius:999px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;
}
.sb-empty{padding:1.5rem .75rem;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.65}

/* ── Main area ──────────────────────────────────────────────────────────────── */
#eg-main{
  flex:1;display:flex;flex-direction:column;min-width:0;
  position:relative;
  background:
    radial-gradient(ellipse at 25% 20%,color-mix(in srgb,var(--primary) 4%,transparent),transparent 55%),
    radial-gradient(ellipse at 78% 78%,color-mix(in srgb,#7C3AED 3%,transparent),transparent 50%),
    var(--surface-2);
}

/* ── Toolbar ────────────────────────────────────────────────────────────────── */
#eg-tb{
  display:flex;align-items:center;gap:.35rem;
  padding:.4rem .65rem;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;z-index:20;
}
.tb-back-lnk{
  font-size:11px;font-weight:700;color:var(--text-muted);
  text-decoration:none;padding:4px 9px;border-radius:5px;
  background:var(--surface-2);border:1px solid var(--border);
  transition:all .12s;white-space:nowrap;
}
.tb-back-lnk:hover{color:var(--text);background:var(--surface-3,var(--border))}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 .05rem;flex-shrink:0}
.tb-btn{
  display:flex;align-items:center;gap:4px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:750;
  cursor:pointer;min-height:30px;transition:all .12s;white-space:nowrap;flex-shrink:0;
}
.tb-btn:hover{background:var(--surface-3,var(--border));border-color:var(--border-strong,var(--border))}
.tb-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.tb-btn.primary:hover{opacity:.85}
.tb-btn.suggest{color:#7C3AED;border-color:#C4B5FD}
.tb-btn.suggest:hover{background:#F5F3FF}
.tb-btn.danger{background:#FEE2E2;color:#DC2626;border-color:#FECACA}
.tb-btn.danger:hover{opacity:.85}
.tb-btn.sm{padding:3px 8px;font-size:10px;min-height:24px;border-radius:5px}

/* ── Cytoscape ──────────────────────────────────────────────────────────────── */
#cy{flex:1;display:block;cursor:default;min-height:0}

/* ── Zoom overlay ───────────────────────────────────────────────────────────── */
#eg-zoom{
  position:absolute;bottom:.9rem;left:.9rem;
  display:flex;align-items:center;gap:1px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:3px 4px;z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.09);
}
#eg-zoom button{
  background:none;border:none;cursor:pointer;font-size:14px;
  width:26px;height:26px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .12s;
}
#eg-zoom button:hover{background:var(--surface-2);color:var(--text)}
#zoom-pill{
  font-size:11px;font-weight:700;color:var(--text-muted);
  min-width:42px;text-align:center;font-family:Consolas,monospace;padding:0 2px;
}

/* ── Bottom panel ───────────────────────────────────────────────────────────── */
#bp{
  position:absolute;bottom:0;left:0;right:0;
  height:44vh;min-height:260px;
  background:var(--surface);
  border-top:2px solid var(--border);
  box-shadow:0 -4px 24px rgba(0,0,0,.12);
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:100;
  display:flex;flex-direction:column;
}
#bp.open{transform:translateY(0)}
#bp-header{
  display:flex;align-items:center;
  padding:.5rem .85rem;border-bottom:1px solid var(--border);
  gap:.5rem;flex-shrink:0;background:var(--surface-2);min-height:46px;
}
#bp-entity-info{display:flex;align-items:center;gap:.4rem;flex:1;min-width:0}
#bp-title{
  font-size:14px;font-weight:800;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
#bp-header-actions{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
.type-pill{
  font-size:9px;font-weight:800;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;border:1px solid;
  cursor:pointer;transition:opacity .12s;flex-shrink:0;line-height:1.5;
}
.type-pill:hover{opacity:.75}
.type-pill.fact{background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.type-pill.dimension{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.type-pill.bridge{background:#F5F3FF;color:#6B21A8;border-color:#DDD6FE}
#bp-close-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);font-size:16px;padding:2px 6px;
  border-radius:4px;line-height:1;transition:all .12s;
}
#bp-close-btn:hover{background:var(--surface-3,var(--border));color:var(--text)}

/* ── BP Tabs ────────────────────────────────────────────────────────────────── */
#bp-tabs{
  display:flex;align-items:center;gap:0;
  padding:.45rem .75rem;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.bp-tab{
  display:flex;align-items:center;gap:.3rem;
  padding:.3rem .8rem;
  border:1px solid var(--border);
  background:none;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-muted);cursor:pointer;
  transition:all .15s;
  margin-right:-1px;position:relative;
}
.bp-tab:first-child{border-radius:5px 0 0 5px}
.bp-tab:last-child{border-radius:0 5px 5px 0;margin-right:0}
.bp-tab:hover{background:var(--surface-2);color:var(--text);z-index:1}
.bp-tab.active{
  background:color-mix(in srgb,var(--primary) 14%,var(--surface));
  border-color:var(--primary);color:var(--primary);z-index:2;
}
.bp-tab-badge{
  font-size:9px;font-weight:900;min-width:16px;height:16px;
  border-radius:999px;padding:0 4px;
  display:inline-flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--primary) 18%,var(--surface-2));
  color:var(--primary);
}
.bp-tab.active .bp-tab-badge{
  background:var(--primary);color:#fff;
}
#bp-content{flex:1;overflow-y:auto;min-height:0;padding:.65rem .85rem}

/* ── Details tab ────────────────────────────────────────────────────────────── */
.dt-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.55rem}
.dt-field label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);display:block;margin-bottom:2px}
.dt-field span{font-size:12px;color:var(--text);font-weight:600}
.dt-field code{font-family:Consolas,monospace;font-size:11px;color:var(--text);background:var(--surface-2);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.dt-desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:.5rem;padding:.4rem .5rem;background:var(--surface-2);border-radius:5px}

/* ── Joins tab ──────────────────────────────────────────────────────────────── */
.join-card{border:1px solid var(--border);border-radius:7px;margin-bottom:.5rem;overflow:hidden;transition:box-shadow .12s}
.join-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.join-card-head{
  display:flex;align-items:center;gap:.5rem;
  padding:.5rem .75rem;cursor:pointer;background:var(--surface);transition:background .1s;
}
.join-card-head:hover{background:var(--surface-2)}
.join-dir{font-size:16px;flex-shrink:0;color:var(--text-muted)}
.join-partner{font-size:13px;font-weight:700;color:var(--primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;background:none;border:none;padding:0;text-align:left}
.join-partner:hover{text-decoration:underline}
.join-type-badge{font-size:9px;font-weight:800;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);flex-shrink:0}
.join-cols{font-size:10px;font-family:Consolas,monospace;color:var(--text-muted);flex-shrink:0;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.join-expand{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:11px;padding:2px 6px;border-radius:4px;flex-shrink:0;transition:all .12s;line-height:1}
.join-expand:hover{background:var(--surface-2);color:var(--text)}
.join-card-body{padding:.7rem .75rem;border-top:1px solid var(--border);background:var(--surface-2);display:none}
.join-card.expanded .join-card-body{display:block}

/* Join edit form */
.jc-section-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin:.55rem 0 .25rem}
.jc-cond-row{display:grid;grid-template-columns:1fr 18px 1fr 26px;gap:.35rem;align-items:center;margin-bottom:.35rem}
.jc-cond-row input{padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;background:var(--surface);color:var(--text);outline:none;width:100%}
.jc-cond-row input:focus{border-color:var(--primary)}
.jc-eq{color:var(--text-muted);font-size:12px;font-weight:700;text-align:center}
.jc-rem{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:2px;transition:all .12s;border-radius:4px;line-height:1;display:flex;align-items:center;justify-content:center}
.jc-rem:hover{color:#DC2626;background:#FEE2E2}
.jc-add-btn{font-size:11px;color:var(--primary);background:none;border:1px dashed var(--border);border-radius:5px;padding:4px 10px;cursor:pointer;width:100%;margin-top:.2rem;transition:all .12s;text-align:center}
.jc-add-btn:hover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 4%,var(--surface))}
.jc-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.4rem}
.jc-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);display:block;margin-bottom:2px}
.jc-select{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;background:var(--surface);color:var(--text);outline:none}
.jc-select:focus{border-color:var(--primary)}
.jc-where{
  width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;
  font-size:11px;font-family:Consolas,monospace;background:var(--surface);color:var(--text);
  resize:vertical;min-height:56px;outline:none;box-sizing:border-box;line-height:1.5;
}
.jc-where:focus{border-color:var(--primary)}
.jc-actions{display:flex;gap:.35rem;margin-top:.55rem;justify-content:flex-end;flex-wrap:wrap}
.jc-save{background:var(--primary);color:#fff;border:1px solid var(--primary);border-radius:5px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .12s}
.jc-save:hover{opacity:.85}
.jc-cancel{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s}
.jc-cancel:hover{background:var(--surface-2)}
.jc-del{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .12s}
/* ThoughtSpot-style join header */
.je-header{display:grid;grid-template-columns:1fr 150px 1fr;gap:.5rem;background:var(--surface-alt,var(--surface));border:1px solid var(--border);border-radius:7px;padding:.55rem .75rem;margin-bottom:.5rem;align-items:start}
.je-th-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin-bottom:3px}
.je-th-name{font-size:12px;font-weight:700;color:var(--text);word-break:break-word}
.je-center{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.je-arrow{color:var(--primary);font-size:13px;font-weight:700;letter-spacing:-.5px}
.je-col-hdrs{display:grid;grid-template-columns:1fr 18px 1fr 26px;gap:.35rem;padding:0 .05rem;margin:.35rem 0 .1rem}
.je-col-hdrs span{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
.jc-col-sel{padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;background:var(--surface);color:var(--text);outline:none;width:100%}
.jc-col-sel:focus{border-color:var(--primary)}
.jc-del:hover{opacity:.85}

/* ── Filter tab ─────────────────────────────────────────────────────────────── */
.filter-desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:.5rem}
.filter-active{
  display:inline-flex;align-items:center;gap:4px;
  background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;
  font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;margin-bottom:.4rem;
}
.filter-ta{
  width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;
  font-size:12px;font-family:Consolas,monospace;background:var(--surface);color:var(--text);
  resize:vertical;min-height:90px;outline:none;box-sizing:border-box;line-height:1.5;
}
.filter-ta:focus{border-color:var(--primary)}
.filter-actions{display:flex;gap:.35rem;margin-top:.45rem}
.filter-save{background:var(--primary);color:#fff;border:1px solid var(--primary);border-radius:6px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .12s}
.filter-save:hover{opacity:.85}
.filter-clear{background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.filter-clear:hover{background:var(--surface-3,var(--border))}

/* ── Modals ─────────────────────────────────────────────────────────────────── */
.eg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.eg-modal{background:var(--surface);border-radius:8px;width:520px;max-width:96vw;box-shadow:0 24px 64px rgba(0,0,0,.22);overflow:hidden}
.eg-modal-head{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);font-size:14px;font-weight:800}
.eg-modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);padding:0 4px;line-height:1;transition:color .12s}
.eg-modal-close:hover{color:var(--text)}
.eg-modal-body{padding:.85rem 1rem}
.eg-form-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.55rem}
.eg-form-row.full{grid-template-columns:1fr}
.eg-lbl{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:.2rem}
.eg-inp{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--surface);color:var(--text);outline:none;box-sizing:border-box;transition:border-color .12s}
.eg-inp:focus{border-color:var(--primary)}
.eg-modal-footer{display:flex;justify-content:flex-end;gap:.4rem;margin-top:.7rem;padding-top:.65rem;border-top:1px solid var(--border)}
.eg-m-btn{border:1px solid var(--border);border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text);transition:all .12s}
.eg-m-btn:hover{background:var(--surface-2)}
.eg-m-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.eg-m-btn.primary:hover{opacity:.85}
</style>
</head>
<body>

<div id="eg-page">

<!-- ══ SIDEBAR ═══════════════════════════════════════════════════════════════ -->
<aside id="eg-sb">
  <div id="eg-sb-head">
    <a href="/admin/clients/{{ client.account_id }}" class="sb-back sb-hide" title="Back to client">← Back</a>

</aside>

  <!-- Toolbar -->
  <div id="eg-tb">

        Details

      <button class="bp-tab" data-tab="joins" onclick="switchTab('joins')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="2.5" cy="6" r="1.5"/><circle cx="9.5" cy="6" r="1.5"/><line x1="4" y1="6" x2="8" y2="6"/><polyline points="6.5,4 8,6 6.5,8"/></svg>

        <div><label class="eg-lbl">Physical table *</label><input id="ef-table" class="eg-inp" placeholder="e.g. dbo.CUS_ORD_IVC_FCT"></div>

<!-- ══ ADD JOIN MODAL ════════════════════════════════════════════════════════ -->
<div class="eg-modal-overlay" id="add-join-modal" style="display:none" onclick="if(event.target===this)closeAddJoinModal()">
  <div class="eg-modal" style="width:480px">
    <div class="eg-modal-head">
      <span>Add Join</span>
      <button onclick="closeAddJoinModal()" class="eg-modal-close">✕</button>
    </div>
    <div class="eg-modal-body">
      <div class="eg-form-row">
        <div><label class="eg-lbl">From entity (FK side)</label><select id="ajm-from" class="eg-inp"></select></div>
        <div><label class="eg-lbl">To entity (PK side)</label><select id="ajm-to" class="eg-inp"></select></div>
      </div>
      <div class="eg-form-row">
        <div><label class="eg-lbl">Left column (FK)</label><input id="ajm-lcol" class="eg-inp" placeholder="e.g. CUSTOMER_KEY"></div>
        <div><label class="eg-lbl">Right column (PK)</label><input id="ajm-rcol" class="eg-inp" placeholder="e.g. CUSTOMER_KEY"></div>
      </div>
      <div class="eg-form-row">
        <div><label class="eg-lbl">Join type</label>
          <select id="ajm-jtype" class="eg-inp">
            <option value="LEFT">LEFT JOIN</option>
            <option value="INNER">INNER JOIN</option>
          </select>
        </div>
        <div><label class="eg-lbl">Cardinality</label>
          <select id="ajm-card" class="eg-inp">
            <option value="many_to_one">Many → One</option>
            <option value="one_to_one">One → One</option>
            <option value="one_to_many">One → Many</option>
          </select>
        </div>
      </div>
      <div class="eg-modal-footer">
        <button onclick="closeAddJoinModal()" class="eg-m-btn">Cancel</button>
        <button onclick="saveNewJoin()" class="eg-m-btn primary">Add Join</button>
      </div>
    </div>
  </div>
</div>

<script>
const ACCOUNT_ID    = "{{ client.account_id }}";
const API_BASE      = `/admin/clients/${ACCOUNT_ID}/graph/api`;
const ENTITY_COLUMNS = {{ entity_columns | tojson | safe }};

// Inject <datalist> elements for searchable column inputs — one per entity
(function(){
  const frag = document.createDocumentFragment();
  Object.entries(ENTITY_COLUMNS).forEach(([ename, cols]) => {
    const dl = document.createElement('datalist');
    dl.id = 'dl-' + ename.toUpperCase().replace(/[^A-Z0-9_]/g,'_');
    cols.forEach(c => { const o = document.createElement('option'); o.value = c; dl.appendChild(o); });
    frag.appendChild(dl);
  });
  document.body.appendChild(frag);
})();

let graphData = {
  entities:      {{ entities      | tojson | safe }},
  relationships: {{ relationships | tojson | safe }},
  properties:    [],
};

const TYPE_COLORS = { fact:'#D97706', dimension:'#2563EB', bridge:'#7C3AED' };
const TYPE_BG     = { fact:'#FFFBEB', dimension:'#EFF6FF', bridge:'#F5F3FF' };
const TYPE_LABELS = { fact:'FACT', dimension:'DIM', bridge:'BRIDGE' };
const TYPE_ORDER  = ['fact', 'dimension', 'bridge'];

let cy              = null;
let _selectedEntity = null;
let _selectedRelId  = null;
let _currentTab     = 'details';
let _expandedRelId  = null;
let sidebarCollapsed = false;
let activeTypeFilter = '';
let _savePosTimer    = null;

// ── Helpers ────────────────────────────────────────────────────────────────────
function _esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _parseJC(jc) {
  if (!jc) return [];
  if (Array.isArray(jc)) return jc;
  try { return JSON.parse(jc) || []; } catch { return []; }
}

// ── Cytoscape ──────────────────────────────────────────────────────────────────
function buildElements() {
  const nodes = graphData.entities.map(e => {
    const et = e.entity_type || 'dimension';
    return {
      data: {
        id:      e.entity_name,
        label:   e.display_name || e.entity_name,
        tblFqn:  [e.schema_name, e.table_name].filter(Boolean).join('.') || e.entity_name,
        type:    et,
        color:   e.color || TYPE_COLORS[et] || '#2563EB',
        bgColor: TYPE_BG[et] || '#EFF6FF',
        status:  e.status || 'confirmed',
        _raw:    e,
      },
      position: { x: parseFloat(e.pos_x)||0, y: parseFloat(e.pos_y)||0 },
    };
  });
  const edges = graphData.relationships.map(r => {
    const jc  = _parseJC(r.join_conditions);
    const fc  = r.from_column || (jc[0]?.from_col || '');
    const tc  = r.to_column   || (jc[0]?.to_col   || '');
    return {
      data: {
        id:        `rel-${r.id}`,
        source:    r.from_entity,
        target:    r.to_entity,
        edgeLabel: fc && tc ? `${fc} = ${tc}` : '',
        joinType:  r.join_type || 'LEFT',
        relStatus: r.validation_status || r.status || 'untested',
        suggested: r.status === 'suggested',
        relId:     r.id,
        _raw:      r,
      },
    };
  });
  return [...nodes, ...edges];
}

function cyStyle() {
  return [
    { selector:'node', style:{
      'shape':'round-rectangle','width':176,'height':52,
      'background-color':'data(bgColor)','border-width':2,'border-color':'data(color)',
      'label':'data(label)',
      'text-valign':'center','text-halign':'center',
      'font-family':'system-ui,-apple-system,sans-serif','font-size':12,'font-weight':700,
      'color':'data(color)','text-wrap':'ellipsis','text-max-width':154,'cursor':'pointer',
    }},
    { selector:'node[status="suggested"]', style:{'border-style':'dashed','opacity':0.78}},
    { selector:'node:selected', style:{
      'border-width':3,'underlay-color':'data(color)','underlay-padding':5,'underlay-opacity':0.15,
    }},
    { selector:'node.canvas-hover', style:{'underlay-color':'data(color)','underlay-padding':4,'underlay-opacity':0.10}},
    { selector:'edge', style:{
      'width':2,'line-color':'#94A3B8','target-arrow-color':'#94A3B8',
      'target-arrow-shape':'triangle','curve-style':'bezier',
      'font-size':9,'color':'#64748B',
      'text-background-color':'white','text-background-opacity':0.85,'text-background-padding':'2px',
    }},
    { selector:'edge[?suggested]', style:{'line-style':'dashed','line-color':'#F59E0B','target-arrow-color':'#F59E0B','opacity':0.75}},
    { selector:'edge[relStatus="valid"]',   style:{'line-color':'#059669','target-arrow-color':'#059669'}},
    { selector:'edge[relStatus="warning"]', style:{'line-style':'dashed','line-color':'#D97706','target-arrow-color':'#D97706'}},
    { selector:'edge[relStatus="broken"]',  style:{'line-style':'dashed','line-color':'#DC2626','target-arrow-color':'#DC2626'}},
    { selector:'edge:selected', style:{'width':3,'line-color':'#F59E0B','target-arrow-color':'#F59E0B','label':'data(edgeLabel)'}},
    { selector:'edge.hovered', style:{'label':'data(edgeLabel)','width':2.5,'line-color':'#475569','target-arrow-color':'#475569'}},
  ];
}

function initCytoscape() {
  const hasPos = graphData.entities.some(e => e.pos_x || e.pos_y);
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements:  buildElements(),
    style:     cyStyle(),
    layout:    hasPos
      ? { name:'preset' }
      : { name:'dagre', rankDir:'LR', nodeSep:48, rankSep:160, padding:40 },
    wheelSensitivity: 0.3,
    minZoom: 0.08,
    maxZoom: 3,
  });
  cy.on('tap', 'node', e => { e.stopPropagation(); selectEntity(e.target.data('id')); });
  cy.on('tap', 'edge', e => { e.stopPropagation(); selectEdge(e.target.data('relId')); });
  cy.on('tap', e  => { if (e.target === cy) closeBP(); });
  cy.on('dbltap', e => { if (e.target === cy) openEntityModal(null); });
  cy.on('zoom pan', syncZoom);
  cy.on('dragfree', 'node', e => {
    const n = e.target, p = n.position();
    clearTimeout(_savePosTimer);
    _savePosTimer = setTimeout(() => saveEntityPosition(n.data('id'), p.x, p.y), 900);
  });
  cy.on('mouseover', 'edge', e => e.target.addClass('hovered'));
  cy.on('mouseout',  'edge', e => e.target.removeClass('hovered'));
  cy.on('mouseover', 'node', e => e.target.addClass('canvas-hover'));
  cy.on('mouseout',  'node', e => e.target.removeClass('canvas-hover'));
  buildSidebar();
  loadProperties();
  syncZoom();
}

function fitView()  { cy.fit(null, 40); }
function syncZoom() {
  const z  = Math.round(cy.zoom()*100) + '%';
  const el = document.getElementById('zoom-pill');
  if (el) el.textContent = z;
}

// ── Sidebar ────────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('sb-list');
  const cnt  = document.getElementById('sb-count');
  list.innerHTML = '';
  const q   = (document.getElementById('sb-search')?.value || '').toLowerCase();
  const typ = activeTypeFilter;
  let visible = 0;

  graphData.entities.forEach(e => {
    const name = (e.display_name || e.entity_name).toLowerCase();
    if (q && !name.includes(q) && !e.entity_name.toLowerCase().includes(q)) return;
    if (typ && e.entity_type !== typ) return;
    visible++;
    const et    = e.entity_type || 'dimension';
    const color = e.color || TYPE_COLORS[et] || '#2563EB';
    const jc    = graphData.relationships.filter(r => r.from_entity===e.entity_name || r.to_entity===e.entity_name).length;
    const row   = document.createElement('div');
    row.className = 'sb-row' + (e.entity_name===_selectedEntity ? ' active' : '');
    row.dataset.ename = e.entity_name;
    row.innerHTML = `
      <span class="sb-dot" style="background:${color}"></span>
      <span class="sb-name">${_esc(e.display_name || e.entity_name)}</span>
      <span class="sb-type-pill ${et}" onclick="event.stopPropagation();cycleEntityType('${e.entity_name}')" title="Click to change type">${TYPE_LABELS[et]||et}</span>
      ${jc > 0 ? `<span class="sb-jbadge">${jc}</span>` : ''}
    `;
    row.onclick      = () => focusNode(e.entity_name);
    row.onmouseenter = () => cy.getElementById(e.entity_name).addClass('canvas-hover');
    row.onmouseleave = () => cy.getElementById(e.entity_name).removeClass('canvas-hover');
    list.appendChild(row);
  });

  if (cnt) cnt.textContent = visible;
  if (visible === 0) list.innerHTML = '<div class="sb-empty">No tables match.<br>Try a different filter.</div>';
}

function setTypeFilter(btn, type) {
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTypeFilter = type;
  buildSidebar();
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('eg-sb').classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('sb-toggle-btn').textContent = sidebarCollapsed ? '▶' : '◀';
}

// ── Selection ──────────────────────────────────────────────────────────────────
function selectEntity(entityName) {
  cy.$(':selected').unselect();
  cy.getElementById(entityName).select();
  _highlightSidebarRow(entityName);
  _selectedEntity = entityName;
  _selectedRelId  = null;
  openBP(entityName);
}

function selectEdge(relId) {
  const r = graphData.relationships.find(x => x.id === relId);
  if (!r) return;
  cy.$(':selected').unselect();
  cy.getElementById(`rel-${relId}`).select();
  _selectedRelId  = relId;
  const entityName = r.from_entity;
  _selectedEntity  = entityName;
  _highlightSidebarRow(entityName);
  openBP(entityName, 'joins', relId);
}

function focusNode(entityName) {
  const node = cy.getElementById(entityName);
  if (!node.length) return;
  cy.animate({ center:{eles:node}, zoom:Math.max(cy.zoom(), 1.0), duration:350, easing:'ease-in-out-cubic' });
  selectEntity(entityName);
}

function _highlightSidebarRow(entityName) {
  document.querySelectorAll('.sb-row').forEach(r => r.classList.toggle('active', r.dataset.ename === entityName));
}

function closeBP() {
  document.getElementById('bp').classList.remove('open');
  cy.$(':selected').unselect();
  document.querySelectorAll('.sb-row').forEach(r => r.classList.remove('active'));
  _selectedEntity = null;
  _selectedRelId  = null;
  _expandedRelId  = null;
}

function openBP(entityName, tab='details', highlightRelId=null) {
  _selectedEntity = entityName;
  _expandedRelId  = highlightRelId;
  const e = graphData.entities.find(x => x.entity_name === entityName);
  if (!e) return;

  const et    = e.entity_type || 'dimension';
  const color = e.color || TYPE_COLORS[et] || '#2563EB';

  const titleEl = document.getElementById('bp-title');
  titleEl.textContent = e.display_name || e.entity_name;
  titleEl.style.color = color;

  const tpTag = document.getElementById('bp-type-tag');
  tpTag.textContent = TYPE_LABELS[et] || et.toUpperCase();
  tpTag.className = `type-pill ${et}`;

  const joins = graphData.relationships.filter(r => r.from_entity===entityName || r.to_entity===entityName);
  const jcBadge = document.getElementById('bp-join-count');
  if (jcBadge) jcBadge.textContent = joins.length;

  document.getElementById('bp-edit-btn').style.display   = '';
  document.getElementById('bp-delete-btn').style.display = '';
  document.getElementById('bp').classList.add('open');
  switchTab(tab);
}

function switchTab(tab) {
  _currentTab = tab;
  document.querySelectorAll('.bp-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const e = graphData.entities.find(x => x.entity_name === _selectedEntity);
  if (!e) return;
  if      (tab === 'details') renderDetailsTab(e);
  else if (tab === 'joins')   renderJoinsTab(e.entity_name, _expandedRelId);
  else if (tab === 'filter')  renderFilterTab(e);
}

// ── Details tab ────────────────────────────────────────────────────────────────
function renderDetailsTab(e) {
  const tblFqn = [e.schema_name, e.table_name].filter(Boolean).join('.') || e.entity_name;
  const joins  = graphData.relationships.filter(r => r.from_entity===e.entity_name || r.to_entity===e.entity_name);
  document.getElementById('bp-content').innerHTML = `
    <div class="dt-grid">
      <div class="dt-field"><label>Physical Table</label><span><code>${_esc(tblFqn)}</code></span></div>
      <div class="dt-field"><label>Primary Key</label><span>${e.pk_column ? `<code>${_esc(e.pk_column)}</code>` : '<span style="color:var(--text-muted)">—</span>'}</span></div>
      <div class="dt-field"><label>Joins</label><span style="font-weight:700">${joins.length} relationship${joins.length!==1?'s':''}</span></div>
      <div class="dt-field"><label>Status</label><span style="color:${e.status==='confirmed'?'#059669':'#D97706'}">${(e.status||'confirmed').toUpperCase()}</span></div>
    </div>
    ${e.description?`<div class="dt-desc">${_esc(e.description)}</div>`:''}
    <div style="display:flex;gap:.4rem;margin-top:.4rem;flex-wrap:wrap">
      <button class="tb-btn sm" onclick="switchTab('joins')">⇢ View joins (${joins.length})</button>
      <button class="tb-btn sm" onclick="switchTab('filter')">⧧ View filter</button>
      ${e.entity_filter?'<span style="font-size:10px;color:#059669;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:999px;padding:2px 8px;font-weight:800;display:flex;align-items:center">Filter active</span>':''}
    </div>
  `;
}

// ── Joins tab ──────────────────────────────────────────────────────────────────
function renderJoinsTab(entityName, expandRelId=null) {
  const joins = graphData.relationships.filter(r => r.from_entity===entityName || r.to_entity===entityName);
  const content = document.getElementById('bp-content');
  if (joins.length === 0) {
    content.innerHTML = `
      <div style="text-align:center;color:var(--text-muted);padding:1.5rem 0;font-size:12px;line-height:1.7">
        <div style="font-size:28px;opacity:.2;margin-bottom:.4rem">◦—◦</div>
        No joins defined yet.
        <br>
        <button class="tb-btn sm primary" style="margin-top:.5rem" onclick="openAddJoinModal('${entityName}')">+ Add first join</button>
      </div>`;
    return;
  }
  const cards = joins.map(r => renderJoinCard(r, entityName, r.id === expandRelId)).join('');
  content.innerHTML = `
    <div id="jc-list">${cards}</div>
    <button class="tb-btn sm" style="margin-top:.35rem;width:100%;justify-content:center" onclick="openAddJoinModal('${entityName}')">+ Add join</button>
  `;
  if (expandRelId) {
    const el = document.getElementById(`jc-${expandRelId}`);
    if (el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function renderJoinCard(r, currentEntity, expanded=false) {
  const isFrom  = r.from_entity === currentEntity;
  const partner = isFrom ? r.to_entity : r.from_entity;
  const jt      = (r.join_type||'LEFT').toUpperCase();
  const jc      = _parseJC(r.join_conditions);
  const pFrom   = r.from_column || (jc[0]?.from_col || '');
  const pTo     = r.to_column   || (jc[0]?.to_col   || '');
  const colSumm = pFrom && pTo ? `${pFrom} = ${pTo}` : (pFrom || pTo || '—');

  const body = expanded ? _buildJoinEditForm(r, jc) : '';
  return `<div class="join-card${expanded?' expanded':''}" id="jc-${r.id}">
    <div class="join-card-head" onclick="toggleJoinCard(${r.id})">
      <span class="join-dir">${isFrom?'→':'←'}</span>
      <button class="join-partner" onclick="event.stopPropagation();focusNode('${_esc(partner)}')">${_esc(partner)}</button>
      <span class="join-type-badge">${jt}</span>
      <span class="join-cols" title="${_esc(colSumm)}">${_esc(colSumm)}</span>
      <span class="join-expand">${expanded?'▲':'▼'}</span>
    </div>
    <div class="join-card-body">${body}</div>
  </div>`;
}

function _dlId(entityName) {
  return 'dl-' + (entityName||'').toUpperCase().replace(/[^A-Z0-9_]/g,'_');
}

function _colEl(side, relId, idx, val, cols, entityName) {
  const elId = side==='from' ? `jcf-${relId}-${idx}` : `jct-${relId}-${idx}`;
  const ph   = side==='from' ? 'Type to search source column…' : 'Type to search dest column…';
  const listAttr = entityName ? ` list="${_dlId(entityName)}"` : '';
  return `<input type="text" class="jc-col-sel" id="${elId}"${listAttr} value="${_esc(val)}" placeholder="${ph}" autocomplete="off" spellcheck="false">`;
}

function _buildJoinEditForm(r, jc) {
  const fromName = r.from_entity || '';
  const toName   = r.to_entity   || '';
  const fromCols = ENTITY_COLUMNS[(fromName).toUpperCase()] || [];
  const toCols   = ENTITY_COLUMNS[(toName).toUpperCase()]   || [];

  const allConds = jc.length
    ? jc
    : (r.from_column || r.to_column
       ? [{from_col: r.from_column||'', to_col: r.to_column||''}]
       : [{from_col:'', to_col:''}]);

  const condRows = allConds.map((c, i) => `
    <div class="jc-cond-row" id="jcrow-${r.id}-${i}">
      ${_colEl('from', r.id, i, c.from_col||'', fromCols, fromName)}
      <span class="jc-eq">=</span>
      ${_colEl('to',   r.id, i, c.to_col||'',   toCols, toName)}
      <button class="jc-rem" onclick="removeJoinCond(${r.id},${i})" title="Remove">−</button>
    </div>`).join('');

  const jt   = r.join_type || 'LEFT';
  const card = r.relationship_type || 'many_to_one';
  const wc   = r.where_clause || '';

  return `
    <div class="je-header">
      <div>
        <div class="je-th-lbl">Source Table</div>
        <div class="je-th-name">${_esc(fromName)}</div>
      </div>
      <div class="je-center">
        <div style="width:100%">
          <div class="je-th-lbl" style="text-align:center">Join Type</div>
          <select class="jc-select" id="jcjt-${r.id}">
            <option value="LEFT"  ${jt==='LEFT'?'selected':''}>LEFT JOIN</option>
            <option value="INNER" ${jt==='INNER'?'selected':''}>INNER JOIN</option>
            <option value="OUTER" ${jt==='OUTER'?'selected':''}>OUTER JOIN</option>
          </select>
        </div>
        <div class="je-arrow">──→</div>
        <div style="width:100%">
          <div class="je-th-lbl" style="text-align:center">Cardinality</div>
          <select class="jc-select" id="jccard-${r.id}">
            <option value="many_to_one" ${card==='many_to_one'?'selected':''}>Many → One</option>
            <option value="one_to_one"  ${card==='one_to_one'?'selected':''}>One → One</option>
            <option value="one_to_many" ${card==='one_to_many'?'selected':''}>One → Many</option>
          </select>
        </div>
      </div>
      <div>
        <div class="je-th-lbl">Destination Table</div>
        <div class="je-th-name">${_esc(toName)}</div>
      </div>
    </div>
    <div class="je-col-hdrs">
      <span>Source Column(s)</span><span></span><span>Destination Column(s)</span><span></span>
    </div>
    <div id="jc-conds-${r.id}">${condRows}</div>
    <button class="jc-add-btn" onclick="addJoinCond(${r.id})">+ Add column condition</button>
    <div class="jc-section-lbl" style="margin-top:.65rem">WHERE clause (applied to this join)</div>
    <textarea class="jc-where" id="jcwhere-${r.id}" placeholder="Optional: e.g. t.is_active = 1">${_esc(wc)}</textarea>
    <div class="jc-actions">
      <button class="jc-del"    onclick="deleteRel(${r.id})">Delete</button>
      <button class="jc-cancel" onclick="toggleJoinCard(${r.id})">Cancel</button>
      <button class="jc-save"   onclick="saveJoinEdit(${r.id})">Save</button>
    </div>
  `;
}

function toggleJoinCard(relId) {
  const card = document.getElementById(`jc-${relId}`);
  if (!card) return;
  const wasExpanded = card.classList.contains('expanded');
  // Collapse all
  document.querySelectorAll('.join-card.expanded').forEach(c => {
    c.classList.remove('expanded');
    const body = c.querySelector('.join-card-body');
    const exp  = c.querySelector('.join-expand');
    if (body) body.innerHTML = '';
    if (exp)  exp.textContent = '▼';
  });
  _expandedRelId = null;
  if (!wasExpanded) {
    const r  = graphData.relationships.find(x => x.id === relId);
    if (!r) return;
    const jc = _parseJC(r.join_conditions);
    card.classList.add('expanded');
    const body = card.querySelector('.join-card-body');
    const exp  = card.querySelector('.join-expand');
    if (body) body.innerHTML = _buildJoinEditForm(r, jc);
    if (exp)  exp.textContent = '▲';
    _expandedRelId = relId;
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function addJoinCond(relId) {
  const container = document.getElementById(`jc-conds-${relId}`);
  if (!container) return;
  const r = graphData.relationships.find(x => x.id === relId);
  const fromCols = r ? (ENTITY_COLUMNS[(r.from_entity||'').toUpperCase()] || []) : [];
  const toCols   = r ? (ENTITY_COLUMNS[(r.to_entity  ||'').toUpperCase()] || []) : [];
  const i = container.querySelectorAll('.jc-cond-row').length;
  const row = document.createElement('div');
  row.className = 'jc-cond-row';
  row.id = `jcrow-${relId}-${i}`;
  row.innerHTML = `
    ${_colEl('from', relId, i, '', fromCols, r ? r.from_entity : '')}
    <span class="jc-eq">=</span>
    ${_colEl('to',   relId, i, '', toCols,   r ? r.to_entity   : '')}
    <button class="jc-rem" onclick="removeJoinCond(${relId},${i})" title="Remove">−</button>
  `;
  container.appendChild(row);
}

function removeJoinCond(relId, idx) {
  const row = document.getElementById(`jcrow-${relId}-${idx}`);
  if (row) row.remove();
}

async function saveJoinEdit(relId) {
  const r = graphData.relationships.find(x => x.id === relId);
  if (!r) return;

  const container = document.getElementById(`jc-conds-${relId}`);
  const condRows  = container ? container.querySelectorAll('.jc-cond-row') : [];
  const join_conditions = [];
  condRows.forEach(row => {
    const fromEl = row.querySelector('[id^="jcf-"]');
    const toEl   = row.querySelector('[id^="jct-"]');
    const fc = (fromEl?.value || '').trim();
    const tc = (toEl?.value   || '').trim();
    if (fc || tc) join_conditions.push({from_col: fc, to_col: tc});
  });

  const join_type         = document.getElementById(`jcjt-${relId}`)?.value   || 'LEFT';
  const relationship_type = document.getElementById(`jccard-${relId}`)?.value || 'many_to_one';
  const where_clause      = (document.getElementById(`jcwhere-${relId}`)?.value || '').trim();
  const from_column       = join_conditions[0]?.from_col || r.from_column || '';
  const to_column         = join_conditions[0]?.to_col   || r.to_column   || '';

  const payload = {
    rel_id: relId,
    from_entity: r.from_entity,
    to_entity:   r.to_entity,
    from_column, to_column,
    join_type, relationship_type,
    join_conditions, where_clause,
    label:  r.label || '',
    status: 'confirmed',
  };

  const resp = await fetch(`${API_BASE}/relationships`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload),
  });
  if (!resp.ok) { alert('Save failed'); return; }

  // Update local state
  const idx = graphData.relationships.findIndex(x => x.id === relId);
  if (idx >= 0) {
    graphData.relationships[idx] = {
      ...graphData.relationships[idx],
      ...payload,
      join_conditions: JSON.stringify(join_conditions),
    };
  }
  // Update canvas edge label
  const edgeLabel = from_column && to_column ? `${from_column} = ${to_column}` : '';
  cy.getElementById(`rel-${relId}`).data({edgeLabel, joinType: join_type});

  _expandedRelId = null;
  buildSidebar();
  renderJoinsTab(_selectedEntity);
}

// ── Filter tab ─────────────────────────────────────────────────────────────────
function renderFilterTab(e) {
  const hasFilter = !!(e.entity_filter||'').trim();
  document.getElementById('bp-content').innerHTML = `
    <p class="filter-desc">
      Define a SQL WHERE condition that is automatically injected whenever this table is used in a query.<br>
      Example: <code style="background:var(--surface-2);padding:1px 5px;border-radius:3px;font-family:Consolas,monospace;font-size:11px">is_active = 1</code>
    </p>
    ${hasFilter ? '<div class="filter-active">✓ Filter active</div><br>' : ''}
    <textarea class="filter-ta" id="filter-ta" placeholder="e.g. is_deleted = 0 AND fiscal_year = 2024">${_esc(e.entity_filter||'')}</textarea>
    <div class="filter-actions">
      <button class="filter-save" onclick="saveFilter()">Save filter</button>
      ${hasFilter ? `<button class="filter-clear" onclick="clearFilter()">Clear</button>` : ''}
    </div>
  `;
}

async function saveFilter() {
  if (!_selectedEntity) return;
  const val = (document.getElementById('filter-ta')?.value || '').trim();
  const resp = await fetch(`${API_BASE}/entities/${encodeURIComponent(_selectedEntity)}/filter`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({entity_filter: val}),
  });
  if (!resp.ok) { alert('Save failed'); return; }
  const e = graphData.entities.find(x => x.entity_name === _selectedEntity);
  if (e) { e.entity_filter = val; renderFilterTab(e); }
}

async function clearFilter() {
  const ta = document.getElementById('filter-ta');
  if (ta) ta.value = '';
  await saveFilter();
}

// ── Entity type cycle ──────────────────────────────────────────────────────────
async function cycleEntityType(entityName) {
  const en = entityName || _selectedEntity;
  if (!en) return;
  const e = graphData.entities.find(x => x.entity_name === en);
  if (!e) return;
  const nextType = TYPE_ORDER[(TYPE_ORDER.indexOf(e.entity_type||'dimension') + 1) % TYPE_ORDER.length];
  e.entity_type = nextType;
  e.color       = TYPE_COLORS[nextType];

  cy.getElementById(en).data({type: nextType, color: TYPE_COLORS[nextType], bgColor: TYPE_BG[nextType]});

  await fetch(`${API_BASE}/entities/${encodeURIComponent(en)}/type`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({entity_type: nextType, color: TYPE_COLORS[nextType]}),
  }).catch(() => {});

  buildSidebar();
  if (_selectedEntity === en && document.getElementById('bp').classList.contains('open')) {
    const tpTag = document.getElementById('bp-type-tag');
    if (tpTag) { tpTag.textContent = TYPE_LABELS[nextType]; tpTag.className = `type-pill ${nextType}`; }
    const titleEl = document.getElementById('bp-title');
    if (titleEl) titleEl.style.color = TYPE_COLORS[nextType];
    if (_currentTab === 'details') renderDetailsTab(e);
  }
}

// ── Delete ─────────────────────────────────────────────────────────────────────
function deleteSelected() {
  if (_selectedRelId)    deleteRel(_selectedRelId);
  else if (_selectedEntity) deleteEntity(_selectedEntity);
}

async function deleteEntity(name) {
  if (!confirm(`Delete "${name}"?\nAll its joins will also be removed.`)) return;
  const r = await fetch(`${API_BASE}/entities/${encodeURIComponent(name)}`, {method:'DELETE'});
  if (!r.ok) { alert('Delete failed'); return; }
  graphData.entities      = graphData.entities.filter(e => e.entity_name !== name);
  graphData.relationships = graphData.relationships.filter(r => r.from_entity!==name && r.to_entity!==name);
  cy.getElementById(name).remove();
  cy.edges().filter(e => e.data('source')===name || e.data('target')===name).remove();
  closeBP();
  buildSidebar();
}

async function deleteRel(relId) {
  if (!confirm('Delete this join?')) return;
  const r = await fetch(`${API_BASE}/relationships/${relId}`, {method:'DELETE'});
  if (!r.ok) { alert('Delete failed'); return; }
  graphData.relationships = graphData.relationships.filter(x => x.id !== relId);
  cy.getElementById(`rel-${relId}`).remove();
  _selectedRelId = null;
  _expandedRelId = null;
  buildSidebar();
  if (_selectedEntity) renderJoinsTab(_selectedEntity);
}

// ── Entity CRUD ────────────────────────────────────────────────────────────────
function openEntityModal(entityName) {
  const e = entityName ? graphData.entities.find(x => x.entity_name === entityName) : null;
  document.getElementById('entity-modal-title').textContent = e ? 'Edit Entity' : 'New Entity';
  document.getElementById('ef-orig-name').value  = e?.entity_name   || '';
  document.getElementById('ef-name').value       = e?.entity_name   || '';
  document.getElementById('ef-display').value    = e?.display_name  || '';
  document.getElementById('ef-table').value      = [e?.schema_name, e?.table_name].filter(Boolean).join('.') || '';
  document.getElementById('ef-type').value       = e?.entity_type   || 'dimension';
  document.getElementById('ef-desc').value       = e?.description   || '';
  document.getElementById('ef-pk').value         = e?.pk_column     || '';
  document.getElementById('ef-color').value      = e?.color || TYPE_COLORS[e?.entity_type] || '#2563EB';
  document.getElementById('entity-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('ef-name').focus(), 50);
}
function closeEntityModal() { document.getElementById('entity-modal').style.display='none'; }

async function saveEntity() {
  const origName = document.getElementById('ef-orig-name').value;
  const rawTable = document.getElementById('ef-table').value.trim();
  const parts    = rawTable.split('.');
  const payload  = {
    entity_name:  document.getElementById('ef-name').value.trim(),
    display_name: document.getElementById('ef-display').value.trim(),
    table_name:   parts.length>1 ? parts.slice(1).join('.') : parts[0],
    schema_name:  parts.length>1 ? parts[0] : '',
    entity_type:  document.getElementById('ef-type').value,
    description:  document.getElementById('ef-desc').value.trim(),
    pk_column:    document.getElementById('ef-pk').value.trim(),
    color:        document.getElementById('ef-color').value,
    status:       'confirmed',
  };
  if (!payload.entity_name || !payload.table_name) { alert('Entity name and table are required.'); return; }
  const r = await fetch(`${API_BASE}/entities`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload),
  });
  if (!r.ok) { alert('Save failed'); return; }
  const saved = await r.json();
  const color  = payload.color || TYPE_COLORS[payload.entity_type] || '#2563EB';
  const idx    = graphData.entities.findIndex(e => e.entity_name===(origName||payload.entity_name));
  if (idx >= 0) graphData.entities[idx] = {...graphData.entities[idx], ...payload};
  else          graphData.entities.push({...payload, id:saved.id, entity_filter:''});

  const isRename = origName && origName !== payload.entity_name;
  if (isRename) {
    cy.getElementById(origName).remove();
    graphData.relationships.forEach(r => {
      if (r.from_entity===origName) r.from_entity = payload.entity_name;
      if (r.to_entity===origName)   r.to_entity   = payload.entity_name;
    });
  }

  if (!isRename && cy.getElementById(payload.entity_name).length) {
    cy.getElementById(payload.entity_name).data({
      label:   payload.display_name || payload.entity_name,
      color, bgColor: TYPE_BG[payload.entity_type] || '#EFF6FF',
      type:    payload.entity_type, _raw: payload,
    });
  } else {
    const ext = cy.extent();
    const pos  = { x:(ext.x1+ext.x2)/2 + (Math.random()-0.5)*80, y:(ext.y1+ext.y2)/2 };
    cy.add({
      data:{
        id: payload.entity_name, label: payload.display_name||payload.entity_name,
        tblFqn: [payload.schema_name, payload.table_name].filter(Boolean).join('.'),
        type: payload.entity_type, color, bgColor: TYPE_BG[payload.entity_type]||'#EFF6FF',
        status:'confirmed', _raw:payload,
      },
      position: pos,
    });
    if (isRename) {
      graphData.relationships.forEach(rel => {
        if (rel.from_entity===payload.entity_name || rel.to_entity===payload.entity_name) {
          const jc = _parseJC(rel.join_conditions);
          const fc = rel.from_column || (jc[0]?.from_col||'');
          const tc = rel.to_column   || (jc[0]?.to_col||'');
          cy.add({data:{
            id:`rel-${rel.id}`, source:rel.from_entity, target:rel.to_entity,
            edgeLabel: fc&&tc?`${fc} = ${tc}`:'',
            joinType:rel.join_type, relStatus:'untested',
            suggested:rel.status==='suggested', relId:rel.id, _raw:rel,
          }});
        }
      });
    }
  }
  buildSidebar();
  closeEntityModal();
}

// ── Add Join modal ─────────────────────────────────────────────────────────────
function openAddJoinModal(preFrom) {
  const opts = graphData.entities.map(e =>
    `<option value="${_esc(e.entity_name)}"${e.entity_name===preFrom?' selected':''}>${_esc(e.display_name||e.entity_name)}</option>`
  ).join('');
  document.getElementById('ajm-from').innerHTML = opts;
  document.getElementById('ajm-to').innerHTML   = opts;
  if (preFrom) { document.getElementById('ajm-from').value = preFrom; }
  document.getElementById('ajm-lcol').value = '';
  document.getElementById('ajm-rcol').value = '';
  document.getElementById('add-join-modal').style.display='flex';
}
function closeAddJoinModal() { document.getElementById('add-join-modal').style.display='none'; }

async function saveNewJoin() {
  const from_entity       = document.getElementById('ajm-from').value;
  const to_entity         = document.getElementById('ajm-to').value;
  const from_column       = document.getElementById('ajm-lcol').value.trim();
  const to_column         = document.getElementById('ajm-rcol').value.trim();
  const join_type         = document.getElementById('ajm-jtype').value;
  const relationship_type = document.getElementById('ajm-card').value;

  if (from_entity === to_entity) { alert('Cannot join a table to itself.'); return; }

  const join_conditions = from_column && to_column ? [{from_col:from_column, to_col:to_column}] : [];
  const payload = {from_entity, to_entity, from_column, to_column, join_type, relationship_type, join_conditions, status:'confirmed'};

  const r = await fetch(`${API_BASE}/relationships`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload),
  });
  if (!r.ok) { alert('Save failed'); return; }
  const saved = await r.json();
  const rel   = {...payload, id:saved.id||saved.rel_id, validation_status:'untested', join_conditions: JSON.stringify(join_conditions)};
  graphData.relationships.push(rel);

  const edgeLabel = from_column && to_column ? `${from_column} = ${to_column}` : '';
  cy.add({data:{
    id:`rel-${rel.id}`, source:from_entity, target:to_entity,
    edgeLabel, joinType:join_type, relStatus:'untested', suggested:false, relId:rel.id, _raw:rel,
  }});

  buildSidebar();
  closeAddJoinModal();
  // Update join count badge if panel is open
  if (_selectedEntity) {
    const joins = graphData.relationships.filter(r => r.from_entity===_selectedEntity || r.to_entity===_selectedEntity);
    const badge = document.getElementById('bp-join-count');
    if (badge) badge.textContent = joins.length;
    if (_currentTab === 'joins') renderJoinsTab(_selectedEntity);
  }
}

// ── Suggest ────────────────────────────────────────────────────────────────────
async function runSuggest() {
  const btn = document.getElementById('suggest-btn');
  btn.textContent = '⟳ Thinking…'; btn.disabled = true;
  try {
    const r = await fetch(`${API_BASE}/suggest`, {method:'POST'});
    if (r.ok) {
      const fresh = await fetch(`${API_BASE}/graph.json`);
      const gd = await fresh.json();
      graphData.entities      = gd.entities;
      graphData.relationships = gd.relationships;
      graphData.properties    = gd.properties || [];
      cy.elements().remove();
      cy.add(buildElements());
      cy.layout({name:'dagre', rankDir:'LR', nodeSep:48, rankSep:160, padding:40}).run();
      buildSidebar();
      closeBP();
    } else {
      alert('Suggestion failed. Check the console for details.');
    }
  } catch(e) {
    alert('Suggestion error: ' + e.message);
  } finally {
    btn.textContent = '✦ Suggest'; btn.disabled = false;
  }
}

// ── Position ───────────────────────────────────────────────────────────────────
async function saveEntityPosition(name, x, y) {
  await fetch(`${API_BASE}/entities/${encodeURIComponent(name)}/position`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({pos_x: Math.round(x), pos_y: Math.round(y)}),
  }).catch(() => {});
}

// ── Properties ─────────────────────────────────────────────────────────────────
async function loadProperties() {
  try {
    const r = await fetch(`${API_BASE}/graph.json`);
    if (r.ok) { const d = await r.json(); graphData.properties = d.properties || []; }
  } catch(e) {}
}

// ── Keyboard shortcuts ─────────────────────────────────────────────────────────
document.addEventListener('keydown', ev => {
  if (ev.target.tagName==='INPUT'||ev.target.tagName==='TEXTAREA'||ev.target.tagName==='SELECT') return;
  if (ev.key==='Delete'||ev.key==='Backspace') deleteSelected();
  if (ev.key==='f'||ev.key==='F') fitView();
  if (ev.key==='n'||ev.key==='N') openEntityModal(null);
  if (ev.key==='r'||ev.key==='R') openAddJoinModal(_selectedEntity);
  if (ev.key==='Escape') { closeBP(); document.querySelectorAll('.eg-modal-overlay').forEach(m=>m.style.display='none'); }
});

// ── Boot ───────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  cytoscape.use(cytoscapeDagre);
  initCytoscape();
});
</script>
